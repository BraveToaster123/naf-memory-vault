journey_id: urla_data_entry
name: URLA (Form 1003) Data Entry
regulation_tags:
  - URLA
  - ECOA
overlay_key: default
version: 1
owner: qa-team@yourcompany.com
last_reviewed: 2026-07-14

loan_scenario_id: synthetic-retail-01

kb_articles:
  - urla-1003-field-standards
  - staging-test-accounts-synthetic

app:
  app_id: loan-origination-portal
  doc_wizard_link: /apps/loan-origination-portal/docs

steps:
  - id: open_urla_page
    description: Navigate to URLA data entry for synthetic loan
    url: https://staging.pilot-mortgage.example/loans/{loan_id}/urla
    expected:
      - http_status: 200

  - id: borrower_section_visible
    description: Borrower Information section renders
    assertion:
      type: text_visible
      target: Borrower Information

  - id: required_fields_validation
    description: Required-field validation blocks submit when incomplete
    checkpoint_id: URLA-REQUIRED-FIELDS
    assertion:
      type: text_visible
      target: This field is required

  - id: demographic_optional_notice
    description: ECOA demographic information notice present
    checkpoint_id: ECOA-DEMOGRAPHIC-NOTICE
    assertion:
      type: text_visible
      target: Demographic Information

checkpoints:
  - id: URLA-REQUIRED-FIELDS
    regulation: URLA
    severity: blocking
    description: Required URLA fields must be validated before submission
    assertion_type: text_visible
    target: This field is required

  - id: ECOA-DEMOGRAPHIC-NOTICE
    regulation: ECOA
    severity: warning
    description: Demographic information collection notice should be visible
    assertion_type: text_visible
    target: Demographic Information

playwright:
  test_title_tag: "[urla_data_entry]"
  synthetic_loan_id_env: MEMORY_VAULT_LOAN_SCENARIO
  projects:
    - chromium

memory:
  tier1_record_on_run: true
  tier2_curated: true
  store_snapshot: false
  store_fields:
    - status
    - error_class
    - failure_signature
    - checkpoint_results
