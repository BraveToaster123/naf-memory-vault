journey_id: cd_generation
name: Closing Disclosure Generation
regulation_tags:
  - TRID
  - RESPA
overlay_key: default
version: 1
owner: qa-team@yourcompany.com
last_reviewed: 2026-07-14

loan_scenario_id: synthetic-retail-01

kb_articles:
  - trid-cd-disclosure-overview
  - staging-test-accounts-synthetic

app:
  app_id: loan-origination-portal
  doc_wizard_link: /apps/loan-origination-portal/docs

steps:
  - id: open_cd_page
    description: Navigate to Closing Disclosure for synthetic loan
    url: https://staging.pilot-mortgage.example/loans/{loan_id}/cd
    expected:
      - http_status: 200

  - id: cd_document_title
    description: Closing Disclosure document header visible
    assertion:
      type: text_visible
      target: Closing Disclosure

  - id: apr_visible
    description: APR disclosed per TRID
    checkpoint_id: TRID-CD-APR-VISIBLE
    assertion:
      type: text_visible
      target: Annual Percentage Rate

  - id: fee_table_visible
    description: Loan Costs / Origination Charges section renders
    checkpoint_id: TRID-CD-LOAN-COSTS
    assertion:
      type: text_visible
      target: Origination Charges

  - id: cash_to_close_visible
    description: Cash to Close disclosed
    checkpoint_id: TRID-CD-CASH-TO-CLOSE
    assertion:
      type: text_visible
      target: Cash to Close

checkpoints:
  - id: TRID-CD-APR-VISIBLE
    regulation: TRID
    severity: blocking
    description: Annual Percentage Rate must be visible on Closing Disclosure
    assertion_type: text_visible
    target: Annual Percentage Rate

  - id: TRID-CD-LOAN-COSTS
    regulation: TRID
    severity: blocking
    description: Loan Costs / Origination Charges table must be visible
    assertion_type: text_visible
    target: Origination Charges

  - id: TRID-CD-CASH-TO-CLOSE
    regulation: TRID
    severity: blocking
    description: Cash to Close amount must be visible
    assertion_type: text_visible
    target: Cash to Close

playwright:
  test_title_tag: "[cd_generation]"
  synthetic_loan_id_env: MEMORY_VAULT_LOAN_SCENARIO
  projects:
    - chromium
    - firefox

memory:
  tier1_record_on_run: true
  tier2_curated: true
  store_snapshot: false
  store_fields:
    - status
    - error_class
    - failure_signature
    - checkpoint_results
